id = "build-release"
title = "Build And Release"
layer = "discipline"

[[item]]
id = "build-command-deterministic"
title = "Build/export commands are deterministic and documented"
severity = "required"
applies_when = "Any pipeline or artifact change"
validation = "Update studio/docs/active/build-pipeline.md and matching CLI or workflow steps"
owner = "build-release"

[[item]]
id = "artifact-contract"
title = "Artifact names and destinations are stable"
severity = "recommended"
applies_when = "Packaging, release, or demo prep"
validation = "Check artifact path examples in docs and workflows"
owner = "producer"

[[item]]
id = "ci-short-names"
title = "CI names stay short and canonical"
severity = "required"
applies_when = "Any workflow, job, artifact, or report naming change"
validation = "Keep workflow names, job labels, artifact labels, and report filenames aligned with studio/checklists/base/naming.toml and docs/reference/ci-cd.md"
owner = "build-release"
