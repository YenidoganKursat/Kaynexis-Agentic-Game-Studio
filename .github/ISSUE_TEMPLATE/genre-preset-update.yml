name: Genre preset update
description: Improve or add a genre-specific workflow, guidance, or starter slice
title: "[Genre] "
body:
  - type: input
    id: genre
    attributes:
      label: Genre slug
      placeholder: action-roguelite
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is missing or weak?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: slice
    attributes:
      label: Better first slice
      description: What first playable slice should the repo recommend?
