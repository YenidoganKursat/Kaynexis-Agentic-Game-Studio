name: Docker Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - .github/workflows/docker-smoke.yml
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Docker version
        run: |
          docker version
          docker compose version

      - name: Build helper image
        run: docker compose build

      - name: Run smoke import
        run: docker compose run --rm app python -c "import requests, numpy, pandas, dotenv; print('docker-ok')"

      - name: Capture docker smoke report
        run: |
          mkdir -p build/ci/docker-smoke
          printf "docker-ok\n" > build/ci/docker-smoke/result.txt

      - name: Upload docker smoke report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: docker-smoke-report
          path: build/ci/docker-smoke
          if-no-files-found: error
