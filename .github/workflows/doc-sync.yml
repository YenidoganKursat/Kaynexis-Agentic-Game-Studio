name: Doc Sync

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "studio/**"
      - "docs/**"
      - ".github/workflows/doc-sync.yml"
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "src/**"
      - "scripts/**"
      - "studio/**"
      - "docs/**"
      - ".github/workflows/doc-sync.yml"

permissions:
  contents: read

jobs:
  doc-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Resolve changed paths
        run: |
          mkdir -p build/ci/doc-sync
          python3 scripts/resolve_changed_paths.py \
            --base-sha "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --paths-file build/ci/doc-sync/changed-paths.txt \
            --json > build/ci/doc-sync/resolve-changed-paths.json

      - name: Run doc sync guard
        env:
          PR_AUTHOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || '' }}
        run: |
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            python3 scripts/doc_sync_guard.py --paths-file build/ci/doc-sync/changed-paths.txt --allow-dependabot-pr --pr-author "$PR_AUTHOR" --json > build/ci/doc-sync/doc-sync.json
          else
            python3 scripts/doc_sync_guard.py --paths-file build/ci/doc-sync/changed-paths.txt --json > build/ci/doc-sync/doc-sync.json
          fi

      - name: Upload doc sync report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: doc-sync-report
          path: build/ci/doc-sync
          if-no-files-found: error
