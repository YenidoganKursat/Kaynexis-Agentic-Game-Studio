name: Repo Validate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  repo-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Mark engine tool stubs executable
        run: chmod +x tools/engine-stubs/unity/Unity tools/engine-stubs/unreal/RunUAT.sh

      - name: Compile Python files
        run: python3 -m compileall -q scripts docs studio evals tests

      - name: Validate workflows
        run: python3 scripts/validate_workflows.py

      - name: Validate repo
        run: make validate

      - name: Run doctor
        run: python3 scripts/doctor.py

      - name: Run local evals
        run: python3 scripts/run_local_evals.py

      - name: Run pytest
        run: python3 -m pytest -q tests

      - name: Smoke front-door routing
        run: python3 scripts/codex_studio.py next "Implement the first combat room"

      - name: Smoke checklist resolution
        run: python3 scripts/codex_studio.py checklist --task "Implement the first combat room"

      - name: Smoke Unity adapter command generation
        run: python3 scripts/unity_adapter.py test --project-path studio/starter-kits/unity-6/scaffold --unity-path tools/engine-stubs/unity/Unity --dry-run --json

      - name: Smoke Unreal adapter command generation
        run: python3 scripts/unreal_adapter.py package --project-path studio/starter-kits/unreal-5/scaffold --uat-path tools/engine-stubs/unreal/RunUAT.sh --dry-run --json

      - name: Build CI artifact report
        run: python3 scripts/ci_artifact_report.py --label repo-validate-${{ matrix.python-version }} --output-dir build/ci/repo-validate/${{ matrix.python-version }}

      - name: Resolve changed paths
        run: |
          mkdir -p build/ci/repo-validate/${{ matrix.python-version }}
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          git diff --name-only "$BASE_SHA" HEAD > build/ci/repo-validate/${{ matrix.python-version }}/changed-paths.txt

      - name: Run doc sync guard
        env:
          PR_AUTHOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || '' }}
        run: |
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            python3 scripts/doc_sync_guard.py --paths-file build/ci/repo-validate/${{ matrix.python-version }}/changed-paths.txt --allow-dependabot-pr --pr-author "$PR_AUTHOR" --json > build/ci/repo-validate/${{ matrix.python-version }}/doc-sync.json
          else
            python3 scripts/doc_sync_guard.py --paths-file build/ci/repo-validate/${{ matrix.python-version }}/changed-paths.txt --json > build/ci/repo-validate/${{ matrix.python-version }}/doc-sync.json
          fi

      - name: Run CI quality gate
        run: python3 scripts/ci_quality_gate.py --report build/ci/repo-validate/${{ matrix.python-version }}/ci-report.json --min-score 80 --minimum-readiness validation-ready

      - name: Upload CI artifact report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repo-validate-${{ matrix.python-version }}
          path: build/ci/repo-validate/${{ matrix.python-version }}
          if-no-files-found: error

  ci-artifacts:
    needs: repo-validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Generate consolidated CI artifact report
        run: python3 scripts/ci_artifact_report.py --label consolidated --output-dir build/ci/consolidated

      - name: Upload consolidated CI artifact report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-artifacts-consolidated
          path: build/ci/consolidated
          if-no-files-found: error
