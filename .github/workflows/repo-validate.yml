name: Repo Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  repo-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Compile Python files
        run: python3 -m compileall -q scripts docs studio evals tests

      - name: Validate repo
        run: make validate

      - name: Run doctor
        run: python3 scripts/doctor.py

      - name: Run local evals
        run: python3 scripts/run_local_evals.py

      - name: Run pytest
        run: python3 -m pytest -q tests/test_godot_surface.py

      - name: Smoke route task
        run: python3 scripts/route_task.py "Implement the first combat room"
