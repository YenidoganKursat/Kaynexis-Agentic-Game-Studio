name: Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python3 -m pip install pytest

      - name: Run static smoke
        run: python3 scripts/godot_smoke.py --static-only

      - name: Run automated tests
        run: python3 -m pytest -q tests/test_godot_surface.py
